<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SwiftCargo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px 16px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .card-header {
      background: #1e3a5f;
      padding: 28px 36px;
      text-align: center;
    }
    .card-header h1 {
      color: #fff;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: -0.5px;
    }
    .card-header h1 span { color: #f97316; }
    .card-body { padding: 36px; }
    h2 { color: #1e3a5f; font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 42px 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.18s;
    }
    input:focus { border-color: #1e3a5f; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
      margin: -10px 0 14px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0;
    }
    .strength-label {
      font-size: 12px;
      margin: -10px 0 16px;
      min-height: 16px;
    }
    .requirements {
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .req-item {
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .req-item:last-child { margin-bottom: 0; }
    .req-item.met { color: #16a34a; }
    .req-item svg { flex-shrink: 0; }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: #f97316;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) { background: #ea6c0a; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
      display: none;
    }
    .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: #1e3a5f; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-footer {
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      padding: 14px 36px;
      text-align: center;
    }
    .card-footer p { color: #9ca3af; font-size: 11px; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Swift<span>Cargo</span></h1>
  </div>
  <div class="card-body">
    <h2 id="page-title">Set New Password</h2>
    <p class="subtitle" id="page-subtitle">Create a strong password for your SwiftCargo account. It must be at least 8 characters long.</p>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="reset-form" novalidate>
      <label for="new-password">New Password</label>
      <div class="input-wrap">
        <input type="password" id="new-password" placeholder="Enter new password" autocomplete="new-password" required />
        <button type="button" class="toggle-pw" aria-label="Show password" data-target="new-password">
          <svg id="eye-icon-1" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <p class="strength-label" id="strength-label"></p>

      <div class="requirements">
        <div class="req-item" id="req-len">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.3"/></svg>
          At least 8 characters
        </div>
        <div class="req-item" id="req-upper">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.3"/></svg>
          One uppercase letter
        </div>
        <div class="req-item" id="req-num">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.3"/></svg>
          One number
        </div>
      </div>

      <label for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password" required />
        <button type="button" class="toggle-pw" aria-label="Show password" data-target="confirm-password">
          <svg id="eye-icon-2" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="btn" id="submit-btn">Set New Password</button>
    </form>

    <a href="/" class="back-link" id="back-link">← Back to login</a>
  </div>
  <div class="card-footer">
    <p>SwiftCargo Shipping &amp; Forwarding &bull; Nairobi, Kenya</p>
  </div>
</div>

<script>
(function () {
  // ── Read token from URL ─────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const form        = document.getElementById('reset-form');
  const submitBtn   = document.getElementById('submit-btn');
  const alertError  = document.getElementById('alert-error');
  const alertSuccess = document.getElementById('alert-success');
  const newPwInput  = document.getElementById('new-password');
  const confPwInput = document.getElementById('confirm-password');
  const strengthFill = document.getElementById('strength-fill');
  const strengthLabel = document.getElementById('strength-label');
  const reqLen   = document.getElementById('req-len');
  const reqUpper = document.getElementById('req-upper');
  const reqNum   = document.getElementById('req-num');

  // Show error state if no token present
  if (!token) {
    showError('No reset token found. Please use the link from your email, or request a new password reset.');
    form.style.display = 'none';
  }

  // ── Password visibility toggles ────────────────────────────────────────────
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.setAttribute('aria-label', input.type === 'password' ? 'Show password' : 'Hide password');
    });
  });

  // ── Password strength meter ─────────────────────────────────────────────────
  newPwInput.addEventListener('input', () => {
    const val = newPwInput.value;
    const checks = {
      len:   val.length >= 8,
      upper: /[A-Z]/.test(val),
      num:   /[0-9]/.test(val),
    };
    setReq(reqLen,   checks.len);
    setReq(reqUpper, checks.upper);
    setReq(reqNum,   checks.num);

    const score = Object.values(checks).filter(Boolean).length;
    const bonusStrong = val.length >= 12 && /[^a-zA-Z0-9]/.test(val);
    const pct = bonusStrong ? 100 : (score / 3) * 80;

    const colors = ['#ef4444','#f97316','#eab308','#16a34a'];
    const labels = ['','Weak','Fair','Strong'];
    const colIdx = bonusStrong ? 3 : Math.max(0, score - 1);

    strengthFill.style.width = pct + '%';
    strengthFill.style.background = val.length ? colors[colIdx] : '';
    strengthLabel.textContent = val.length ? (bonusStrong ? 'Very strong' : labels[score] || '') : '';
    strengthLabel.style.color = val.length ? colors[colIdx] : '';
  });

  function setReq(el, met) {
    el.classList.toggle('met', met);
    el.querySelector('svg').innerHTML = met
      ? '<path d="M2 6l3.5 3.5L10 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
      : '<circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.3"/>';
  }

  // ── Form submission ─────────────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlerts();

    const newPw  = newPwInput.value.trim();
    const confPw = confPwInput.value.trim();

    if (!newPw || newPw.length < 8) {
      showError('Password must be at least 8 characters long.');
      return;
    }
    if (newPw !== confPw) {
      showError('Passwords do not match. Please try again.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPw }),
      });
      const data = await res.json();

      if (data.success) {
        form.style.display = 'none';
        document.getElementById('page-title').textContent = 'Password Updated!';
        document.getElementById('page-subtitle').textContent = 'Your password has been set successfully.';
        showSuccess('All done! You can now log in with your new password.');
        document.getElementById('back-link').textContent = '→ Go to Login';
      } else {
        showError(data.message || 'Failed to reset password. The link may have expired.');
      }
    } catch (err) {
      showError('Network error. Please check your connection and try again.');
    } finally {
      setLoading(false);
    }
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.innerHTML = on
      ? '<span class="spinner"></span>Setting password…'
      : 'Set New Password';
  }

  function showError(msg) {
    alertError.style.display = 'block';
    alertError.textContent = msg;
  }

  function showSuccess(msg) {
    alertSuccess.style.display = 'block';
    alertSuccess.textContent = msg;
  }

  function clearAlerts() {
    alertError.style.display = alertSuccess.style.display = 'none';
    alertError.textContent = alertSuccess.textContent = '';
  }
}());
</script>

</body>
</html>
